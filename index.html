<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Todo App</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-background text-on-surface overflow-hidden">
    <div class="flex h-screen w-full">
        <!-- SideNavBar - abhinavgautam08-->
<aside class="hidden md:flex flex-col h-full w-64 border-r-4 border-[#1a1c1c] bg-[#eeeeee] p-4 gap-4 z-20">
            <div class="mb-4 p-2">
                <h1 class="text-xl font-black text-[#1a1c1c] uppercase tracking-tighter">TODO_App</h1>
                <p class="font-bold text-sm uppercase tracking-widest text-[#1a1c1c] opacity-60">Personal Manager</p>
        <!-- Project Description as required by Task 1 -->
                <p class="mt-4 text-xs font-bold leading-relaxed text-on-background opacity-80 border-l-4 border-primary pl-2">
                    A dynamic and robust task manager utilizing local memory. Enables adding, modifying, completing, and
                    tracking tasks.
                </p>
            </div>
            <nav class="flex flex-col gap-2 mt-4">
                <a onclick="setFilter('all')" class="flex items-center gap-3 p-3 bg-[#b70100] text-white border-2 border-[#1a1c1c] transition-all duration-75 ease-in-out font-bold text-sm uppercase tracking-widest cursor-pointer">
                    <span class="material-symbols-outlined" data-icon="wb_sunny">wb_sunny</span>
                    All Tasks
                </a>
                <a onclick="setFilter('pending')" class="flex items-center gap-3 p-3 bg-white text-[#1a1c1c] hover:bg-[#e2e2e2] border-2 border-[#1a1c1c] transition-all duration-75 ease-in-out font-bold text-sm uppercase tracking-widest cursor-pointer">
                    <span class="material-symbols-outlined">radio_button_unchecked</span>
                    Not Complete
                </a>
                <a onclick="setFilter('completed')" class="flex items-center gap-3 p-3 bg-white text-[#1a1c1c] hover:bg-[#e2e2e2] border-2 border-[#1a1c1c] transition-all duration-75 ease-in-out font-bold text-sm uppercase tracking-widest cursor-pointer">
                    <span class="material-symbols-outlined">check_circle</span>
                    Completed
                </a>
            </nav>
        </aside>
        <!-- Main Content Area -->
        <main class="flex-1 flex flex-col min-w-0 bg-background relative overflow-y-auto">
            <!-- TopNavBar -->
            <header
                class="flex justify-between items-center w-full px-6 py-4 bg-[#f9f9f9] border-b-4 border-[#1a1c1c] sticky top-0 z-10 hidden sm:flex">
                <div class="flex items-center gap-8">
                    <span class="text-3xl font-black tracking-tighter text-[#1a1c1c] uppercase">MY DAY</span>
                    <span id="currentDateDisplay" class="font-bold text-sm opacity-60"></span>
                </div>
            </header>
</body>

</html>
